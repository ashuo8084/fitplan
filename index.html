<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan · 增肌减脂智能规划</title>
<meta name="description" content="AI 定制增肌减脂方案：热量计算、食谱推荐、力量训练">
<link rel="manifest" href="data:application/json,{}">
<style>
  :root {
    --bg: #0a0a0f; --card: #13131d; --border: #1e1e30;
    --text: #e8e8f0; --sub: #7c7c9a;
    --accent: #ff5722; --accent2: #00c9a7; --blue: #4a90d9; --gold: #ffb300;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
  .hero{text-align:center;padding:36px 20px 24px;background:linear-gradient(135deg,#0a0a18,#13132b,#0d0d1f);border-bottom:1px solid var(--border)}
  .hero h1{font-size:clamp(26px,5vw,40px);font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--gold),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero p{color:var(--sub);font-size:14px;margin-top:6px}
  .container{max-width:1100px;margin:0 auto;padding:0 20px}
  .form-section{margin-top:-16px;position:relative;z-index:2}
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 22px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
  .form-group label{display:block;font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color.2s,box-shadow.2s}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,87,34,.1)}
  .form-group select{cursor:pointer}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .goal-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .goal-btn{padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--sub);cursor:pointer;text-align:center;font-size:14px;font-weight:700;transition:all.25s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .goal-btn:hover{border-color:var(--accent);color:var(--text)}
  .goal-btn.active.cut{border-color:var(--accent2);color:var(--accent2);background:rgba(0,201,167,.08)}
  .goal-btn.active.bulk{border-color:var(--accent);color:var(--accent);background:rgba(255,87,34,.08)}
  .btn-gen{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ff7043);color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform.15s,box-shadow.15s}
  .btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,87,34,.3)}
  .btn-sm{padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:12px;transition:all.2s}
  .btn-sm:hover{border-color:var(--accent)}
  .btn-sm.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-sm.export-btn{background:var(--accent2);border-color:var(--accent2);color:#000;font-weight:700;margin-left:8px}
  .results{display:none;margin:28px 0}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 12px;text-align:center}
  .stat-card .label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .stat-card .value{font-size:26px;font-weight:800}.stat-card .unit{font-size:11px;color:var(--sub)}.stat-card .subtext{font-size:11px;margin-top:2px}
  .val-red{color:var(--accent)}.val-green{color:var(--accent2)}.val-gold{color:var(--gold)}.val-blue{color:var(--blue)}
  .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
  .card.full{grid-column:1/-1}
  .card-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  .card-title .ct{display:flex;align-items:center;gap:8px}
  .card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .macro-item{margin-bottom:12px}
  .macro-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .macro-bar-wrap{height:9px;background:var(--bg);border-radius:5px;overflow:hidden}
  .macro-bar{height:100%;border-radius:5px;transition:width 1s}
  .macro-bar.protein{background:var(--accent)}.macro-bar.carbs{background:var(--gold)}.macro-bar.fat{background:var(--accent2)}
  .meal-list{list-style:none}
  .meal-list li{padding:10px 12px;border-left:3px solid var(--border);margin-bottom:8px;background:var(--bg);border-radius:0 8px 8px 0;font-size:13px}
  .meal-list li .meal-time{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px}
  .meal-list li .meal-kcal{float:right;font-weight:700;font-size:11px;color:var(--gold)}
  .training-day{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
  .training-day .day-title{font-weight:700;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .day-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
  .day-badge.push{background:rgba(255,87,34,.15);color:var(--accent)}
  .day-badge.pull{background:rgba(74,144,217,.15);color:var(--blue)}
  .day-badge.legs{background:rgba(0,201,167,.15);color:var(--accent2)}
  .day-badge.full{background:rgba(255,179,0,.15);color:var(--gold)}
  .training-day ul{list-style:none}.training-day ul li{font-size:12px;padding:4px 0;display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.03)}
  .training-day ul li span:last-child{color:var(--sub)}
  .tips{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
  .tip-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px}
  .tip-card .tip-icon{font-size:18px;margin-bottom:4px}.tip-card strong{display:block;margin-bottom:3px}
  .weight-section{margin-bottom:16px}
  .weight-input-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .weight-input-row input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;width:120px}
  .weight-input-row input[type=date]{color-scheme:dark;width:140px}
  .weight-table{width:100%;font-size:12px;border-collapse:collapse}
  .weight-table th{text-align:left;padding:6px 8px;color:var(--sub);border-bottom:1px solid var(--border);font-weight:500}
  .weight-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03)}
  .weight-table .del-btn{color:var(--accent);cursor:pointer;background:none;border:none;font-size:14px}
  canvas{width:100%!important;border-radius:8px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .footer{text-align:center;padding:32px 20px;color:var(--sub);font-size:11px}
  .install-banner{display:none;background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:10px 16px;margin-bottom:16px;text-align:center;font-size:13px;cursor:pointer}
  .install-banner:hover{background:#1e1e30}
  @media(max-width:768px){.content-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:480px){.form-grid{grid-template-columns:1fr}}
  @media print{
    body{background:#fff;color:#000}
    .card,.stat-card,.form-card{background:#fff;border:1px solid #ccc;box-shadow:none;break-inside:avoid}
    .hero{background:#fff;border:none}
    .hero h1{-webkit-text-fill-color:#000}
    .form-section,.toolbar,.install-banner,.footer{display:none}
    .results{display:block!important}
  }
</style>
</head>
<body>

<div class="hero">
  <h1>🏋️ FitPlan</h1>
  <p>输入身体数据，AI 即刻定制增肌 / 减脂全方案</p>
</div>

<div class="container">
  <div class="install-banner" id="installBanner" onclick="installPWA()">📲 点击安装到手机桌面，像 App 一样使用</div>

  <div class="form-section">
    <div class="form-card">
      <div class="toolbar">
        <button class="btn-sm active" id="unitMetric" onclick="setUnit('metric')">公制 (kg/cm)</button>
        <button class="btn-sm" id="unitImperial" onclick="setUnit('imperial')">英制 (lb/in)</button>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>性别</label><select id="gender"><option value="male">男性</option><option value="female">女性</option></select></div>
        <div class="form-group"><label>年龄</label><input type="number" id="age" value="25" min="14" max="80"></div>
        <div class="form-group"><label>身高 (<span class="hu">cm</span>)</label><input type="number" id="height" value="175" min="100" max="250" step="0.1"></div>
        <div class="form-group"><label>体重 (<span class="wu">kg</span>)</label><input type="number" id="weight" value="75" min="30" max="250" step="0.1"></div>
        <div class="form-group"><label>体脂率 (%) <span style="color:var(--accent2);font-weight:400">可选</span></label><input type="number" id="bodyfat" placeholder="不知道留空" min="3" max="55" step="0.1"></div>
        <div class="form-group"><label>活动量</label><select id="activity"><option value="1.2">久坐不动</option><option value="1.375">轻度 (1-3次/周)</option><option value="1.55" selected>中度 (3-5次/周)</option><option value="1.725">高度 (6-7次/周)</option><option value="1.9">运动员级别</option></select></div>
      </div>

      <div class="card-title" style="margin-bottom:8px"><span class="ct"><span class="dot" style="background:var(--gold)"></span>训练水平</span></div>
      <div class="row-3" style="margin-bottom:14px">
        <button class="btn-sm active" data-level="beginner" onclick="setLevel('beginner')">🟢 新手 (徒手/哑铃)</button>
        <button class="btn-sm" data-level="intermediate" onclick="setLevel('intermediate')">🟡 进阶 (杠铃+器械)</button>
        <button class="btn-sm" data-level="advanced" onclick="setLevel('advanced')">🔴 高手 (大重量分化)</button>
      </div>

      <div class="card-title" style="margin-bottom:8px"><span class="ct"><span class="dot" style="background:var(--accent2)"></span>饮食模式</span></div>
      <div class="row-3" style="margin-bottom:12px">
        <button class="btn-sm active" data-diet="balanced" onclick="setDiet('balanced')">🥗 均衡膳食</button>
        <button class="btn-sm" data-diet="keto" onclick="setDiet('keto')">🥑 生酮饮食</button>
        <button class="btn-sm" data-diet="lowcarb" onclick="setDiet('lowcarb')">🍖 低碳优脂</button>
      </div>

      <div class="goal-toggle">
        <div class="goal-btn active cut" data-goal="cut" onclick="setGoal('cut')"><span style="font-size:24px">🔥</span>减脂塑形<span style="font-size:10px;color:var(--sub);font-weight:400">热量缺口 · 高蛋白</span></div>
        <div class="goal-btn bulk" data-goal="bulk" onclick="setGoal('bulk')"><span style="font-size:24px">💪</span>增肌增重<span style="font-size:10px;color:var(--sub);font-weight:400">热量盈余 · 高碳水</span></div>
      </div>

      <button class="btn-gen" onclick="generatePlan()">⚡ 生成我的专属方案</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="stats-row" id="statsRow"></div>
    <div class="content-grid">
      <div class="card"><div class="card-title"><span class="ct"><span class="dot" style="background:var(--accent)"></span>每日营养素</span></div><div id="macros"></div></div>
      <div class="card"><div class="card-title"><span class="ct"><span class="dot" style="background:var(--blue)"></span>身体数据</span></div><div id="bodyInfo"></div></div>
      <div class="card full">
        <div class="card-title"><span class="ct"><span class="dot" style="background:var(--gold)"></span>📈 体重追踪</span></span><button class="btn-sm" onclick="addWeight()">+ 记录今日</button></div>
        <div class="weight-section">
          <div class="weight-input-row">
            <input type="date" id="wDate"><input type="number" id="wVal" placeholder="体重" step="0.1"><button class="btn-sm" onclick="addWeight()">记录</button>
            <button class="btn-sm export-btn" onclick="exportData()">📋 导出</button>
          </div>
          <canvas id="weightChart" height="220"></canvas>
          <div style="max-height:150px;overflow-y:auto;margin-top:8px"><table class="weight-table" id="weightTable"></table></div>
        </div>
      </div>
      <div class="card full">
        <div class="card-title"><span class="ct"><span class="dot" style="background:var(--accent2)"></span>🍽️ 每日食谱</span><button class="btn-sm" onclick="shuffleMeals()">🎲 换一换</button></div>
        <div id="mealPlan"></div>
      </div>
      <div class="card full">
        <div class="card-title"><span class="ct"><span class="dot" style="background:var(--accent)"></span>🏋️ 每周训练</span><button class="btn-sm export-btn" onclick="window.print()">🖨️ 打印</button></div>
        <div id="trainingPlan"></div>
      </div>
      <div class="card full"><div class="card-title"><span class="ct"><span class="dot" style="background:var(--gold)"></span>💡 关键提示</span></div><div id="tips"></div></div>
    </div>
  </div>
</div>
<div class="footer">FitPlan v2 · 数据本地存储 · 仅供参考</div>

<script>
// ========== STATE ==========
let unit='metric',goal='cut',level='beginner',diet='balanced';
let weightData=JSON.parse(localStorage.getItem('fitplan_weight')||'[]');
let lastMealSeed=0;
let deferredPrompt=null;

function setUnit(u){unit=u;document.getElementById('unitMetric').classList.toggle('active',u==='metric');document.getElementById('unitImperial').classList.toggle('active',u==='imperial');document.querySelectorAll('.hu').forEach(e=>e.textContent=u==='metric'?'cm':'in');document.querySelectorAll('.wu').forEach(e=>e.textContent=u==='metric'?'kg':'lb');localStorage.setItem('fitplan_unit',u)}
function setGoal(g){goal=g;document.querySelectorAll('.goal-btn').forEach(b=>b.classList.remove('active','cut','bulk'));document.querySelector(`[data-goal="${g}"]`).classList.add('active',g)}
function setLevel(l){level=l;document.querySelectorAll('[data-level]').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-level="${l}"]`).classList.add('active')}
function setDiet(d){diet=d;document.querySelectorAll('[data-diet]').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-diet="${d}"]`).classList.add('active')}

// Restore prefs
(function(){
  const pu=localStorage.getItem('fitplan_unit');if(pu)setUnit(pu);
  document.getElementById('wDate').value=new Date().toISOString().slice(0,10);
})();

// ========== CALCULATIONS ==========
function toKg(v){return unit==='imperial'?v*0.453592:v}
function toCm(v){return unit==='imperial'?v*2.54:v}
function fromKg(v){return unit==='imperial'?v/0.453592:v}
function fromCm(v){return unit==='imperial'?v/2.54:v}

function calcBMR(gender,w,kg,hCm,age,bf){
  if(bf&&bf>3){
    const lbm=w*(1-bf/100);
    return 370+21.6*lbm; // Katch-McArdle
  }
  if(gender==='male')return 10*w+6.25*hCm-5*age+5;
  return 10*w+6.25*hCm-5*age-161;
}

function calcTDEE(bmr,af){return bmr*af}
function calcTarget(tdee,g){return g==='cut'?tdee-450:tdee+400}

function calcMacros(target,g,d,bf){
  let pPct,cPct,fPct;
  if(d==='keto'){pPct=0.25;cPct=0.05;fPct=0.70}
  else if(d==='lowcarb'){pPct=0.35;cPct=0.20;fPct=0.45}
  else if(g==='cut'){pPct=0.40;cPct=0.30;fPct=0.30}
  else{pPct=0.30;cPct=0.50;fPct=0.20}
  // If BF is high, bump protein
  if(bf&&bf>25){pPct+=0.05;cPct-=0.05}
  return{protein:{grams:Math.round(target*pPct/4),cal:Math.round(target*pPct)},carbs:{grams:Math.round(target*cPct/4),cal:Math.round(target*cPct)},fat:{grams:Math.round(target*fPct/9),cal:Math.round(target*fPct)},fiber:Math.round(target/1000*14)};
}

// ========== GENERATE ==========
function generatePlan(){
  const gender=document.getElementById('gender').value;
  const age=parseInt(document.getElementById('age').value)||25;
  const hRaw=parseFloat(document.getElementById('height').value)||175;
  const wRaw=parseFloat(document.getElementById('weight').value)||75;
  const bfRaw=document.getElementById('bodyfat').value;
  const activity=parseFloat(document.getElementById('activity').value)||1.55;

  const hCm=toCm(hRaw),wKg=toKg(wRaw);
  const bf=bfRaw?parseFloat(bfRaw):null;
  const bmi=wKg/((hCm/100)**2);
  const bmr=calcBMR(gender,wKg,hCm,age,bf);
  const tdee=calcTDEE(bmr,activity);
  const targetCal=calcTarget(tdee,goal);
  const macros=calcMacros(targetCal,goal,diet,bf);

  let bmiCat,bmiColor;
  if(bmi<18.5){bmiCat='偏瘦';bmiColor='var(--blue)'}else if(bmi<24){bmiCat='正常';bmiColor='var(--accent2)'}else if(bmi<28){bmiCat='偏胖';bmiColor='var(--gold)'}else{bmiCat='肥胖';bmiColor='var(--accent)'}
  const idealLow=(18.5*(hCm/100)**2).toFixed(1);const idealHigh=(24*(hCm/100)**2).toFixed(1);
  const actLabels={1.2:'久坐',1.375:'轻度',1.55:'中度',1.725:'高度',1.9:'运动员'};

  // Stats
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="label">🎯 目标热量</div><div class="value val-red">${Math.round(targetCal)}</div><div class="unit">kcal/天</div><div class="subtext" style="color:${goal==='cut'?'var(--accent2)':'var(--accent)'}">${goal==='cut'?'⬇ -450':'⬆ +400'}</div></div>
    <div class="stat-card"><div class="label">🔥 基础代谢</div><div class="value val-gold">${Math.round(bmr)}</div><div class="unit">kcal/天</div><div class="subtext">${bf?`体脂${bf}% · Katch`:'Mifflin-StJeor'}</div></div>
    <div class="stat-card"><div class="label">📊 总消耗</div><div class="value val-blue">${Math.round(tdee)}</div><div class="unit">kcal/天</div><div class="subtext">${actLabels[activity]}</div></div>
    <div class="stat-card"><div class="label">⚖️ BMI</div><div class="value" style="color:${bmiColor}">${bmi.toFixed(1)}</div><div class="unit">${bmiCat}</div><div class="subtext">理想${idealLow}~${idealHigh}kg</div></div>
    <div class="stat-card"><div class="label">🥩 蛋白质</div><div class="value val-red">${macros.protein.grams}g</div><div class="unit">${macros.protein.cal}kcal</div><div class="subtext">${(wKg*macros.protein.grams/targetCal).toFixed(1)}g/kg</div></div>
    <div class="stat-card"><div class="label">🍚 碳水 · 脂肪</div><div class="value" style="font-size:16px"><span style="color:var(--gold)">${macros.carbs.grams}g</span> / <span style="color:var(--accent2)">${macros.fat.grams}g</span></div><div class="unit">${macros.carbs.cal}+${macros.fat.cal}kcal</div></div>
  `;

  // Macro bars
  const pPct=macros.protein.cal/targetCal*100,cPct=macros.carbs.cal/targetCal*100,fPct=macros.fat.cal/targetCal*100;
  document.getElementById('macros').innerHTML=`
    <div class="macro-item"><div class="macro-header"><span>🥩 蛋白质</span><span><b>${macros.protein.grams}g</b> · ${macros.protein.cal}kcal (${Math.round(pPct)}%)</span></div><div class="macro-bar-wrap"><div class="macro-bar protein" style="width:${pPct}%"></div></div></div>
    <div class="macro-item"><div class="macro-header"><span>🍚 碳水</span><span><b>${macros.carbs.grams}g</b> · ${macros.carbs.cal}kcal (${Math.round(cPct)}%)</span></div><div class="macro-bar-wrap"><div class="macro-bar carbs" style="width:${cPct}%"></div></div></div>
    <div class="macro-item"><div class="macro-header"><span>🥑 脂肪</span><span><b>${macros.fat.grams}g</b> · ${macros.fat.cal}kcal (${Math.round(fPct)}%)</span></div><div class="macro-bar-wrap"><div class="macro-bar fat" style="width:${fPct}%"></div></div></div>
    <div class="macro-item"><div class="macro-header"><span>🌾 膳食纤维</span><span><b>${macros.fiber}g</b> 以上</span></div></div>

// ========== WEIGHT TRACKER ==========
function addWeight(){
  const date=document.getElementById('wDate').value||new Date().toISOString().slice(0,10);
  const val=parseFloat(document.getElementById('wVal').value);
  if(!val||val<=0)return alert('请输入有效体重');
  weightData=weightData.filter(w=>w.date!==date);
  weightData.push({date,weight:val});
  weightData.sort((a,b)=>a.date.localeCompare(b.date));
  if(weightData.length>200)weightData=weightData.slice(-200);
  localStorage.setItem('fitplan_weight',JSON.stringify(weightData));
  document.getElementById('wVal').value='';
  renderWeightTable();drawWeightChart();
}

function deleteWeight(date){
  weightData=weightData.filter(w=>w.date!==date);
  localStorage.setItem('fitplan_weight',JSON.stringify(weightData));
  renderWeightTable();drawWeightChart();
}

function renderWeightTable(){
  const recent=[...weightData].reverse().slice(0,30);
  document.getElementById('weightTable').innerHTML=recent.length?`
    <tr><th>日期</th><th>体重</th><th>变化</th><th></th></tr>
    ${recent.map((w,i)=>{
      const prev=recent[i+1];
      const diff=prev?(w.weight-prev.weight).toFixed(1):'';
      const diffColor=diff>0?'var(--accent)':diff<0?'var(--accent2)':'var(--sub)';
      const sign=diff>0?'+':'';return`<tr><td>${w.date}</td><td><b>${w.weight}</b></td><td style="color:${diffColor}">${diff?sign+diff:''}</td><td><button class="del-btn" onclick="deleteWeight('${w.date}')">✕</button></td></tr>`;
    }).join('')}
  `:'<div style="text-align:center;padding:20px;color:var(--sub);font-size:13px">📝 还没有记录，输入体重开始追踪</div>';
}

function drawWeightChart(){
  const canvas=document.getElementById('weightChart');
  if(!canvas||weightData.length<2){canvas&&(canvas.style.display='none');return}
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=220*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height='220px';
  ctx.scale(dpr,dpr);

  const data=weightData;
  const pad={top:20,right:20,bottom:30,left:50};
  const w=rect.width-pad.left-pad.right,h=220-pad.top-pad.bottom;
  const vals=data.map(d=>d.weight);
  const yMin=Math.floor(Math.min(...vals)-1),yMax=Math.ceil(Math.max(...vals)+1);

  const xScale=i=>pad.left+(i/(data.length-1))*w;
  const yScale=v=>pad.top+h-((v-yMin)/(yMax-yMin))*h;

  // Grid
  ctx.strokeStyle='#1e2030';ctx.lineWidth=1;
  for(let v=yMin;v<=yMax;v++){const y=yScale(v);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+w,y);ctx.stroke()}
  // Axes
  ctx.strokeStyle='#2a2d3a';ctx.beginPath();ctx.moveTo(pad.left,pad.top);ctx.lineTo(pad.left,pad.top+h);ctx.lineTo(pad.left+w,pad.top+h);ctx.stroke();
  // Y labels
  ctx.fillStyle='#7c7c9a';ctx.font='11px sans-serif';ctx.textAlign='right';
  for(let v=yMin;v<=yMax;v++)ctx.fillText(v.toFixed(1),pad.left-8,yScale(v)+4);
  // X labels
  ctx.textAlign='center';
  const step=Math.max(1,Math.floor(data.length/6));
  for(let i=0;i<data.length;i+=step){ctx.fillText(data[i].date.slice(5),xScale(i),pad.top+h+18)}

  // Line
  ctx.beginPath();ctx.strokeStyle='#ff5722';ctx.lineWidth=2.5;
  for(let i=0;i<data.length;i++){const x=xScale(i),y=yScale(data[i].weight);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke();
  // Dots
  data.forEach((d,i)=>{ctx.beginPath();ctx.arc(xScale(i),yScale(d.weight),4,0,Math.PI*2);ctx.fillStyle='#ff5722';ctx.fill();ctx.strokeStyle='#13131d';ctx.lineWidth=1.5;ctx.stroke()});
  // Fill
  ctx.beginPath();for(let i=0;i<data.length;i++){const x=xScale(i),y=yScale(data[i].weight);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.lineTo(xScale(data.length-1),pad.top+h);ctx.lineTo(xScale(0),pad.top+h);ctx.fillStyle='rgba(255,87,34,0.06)';ctx.fill();

  // Trend arrow
  if(data.length>=7){
    const recent=data.slice(-7);const trend=recent[recent.length-1].weight-recent[0].weight;
    ctx.fillStyle=trend>0?'#ff5722':trend<0?'#00c9a7':'#7c7c9a';ctx.font='bold 13px sans-serif';ctx.textAlign='left';
    ctx.fillText(`近7日: ${trend>0?'+':''}${trend.toFixed(1)}kg`,pad.left+4,pad.top+16);
  }
}

function exportData(){
  const csv='Date,Weight\n'+weightData.map(w=>`${w.date},${w.weight}`).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='weight-data.csv';a.click();
}

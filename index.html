<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan · 增肌减脂智能规划</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131d;
    --border: #1e1e30;
    --text: #e8e8f0;
    --sub: #7c7c9a;
    --accent: #ff5722;
    --accent2: #00c9a7;
    --blue: #4a90d9;
    --pink: #e91e63;
    --gold: #ffb300;
    --red: #ff3d3d;
    --green: #00e676;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ====== Hero ====== */
  .hero {
    text-align: center;
    padding: 48px 20px 32px;
    background: linear-gradient(135deg, #0a0a18 0%, #13132b 40%, #0d0d1f 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p { color: var(--sub); font-size: 15px; margin-top: 8px; }

  /* ====== Content Wrapper ====== */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  /* ====== Form Card ====== */
  .form-section { margin-top: -20px; position: relative; z-index: 2; }
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,87,34,.1);
  }
  .form-group select { cursor: pointer; appearance: none; }
  .goal-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .goal-btn {
    padding: 16px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--sub);
    cursor: pointer;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    transition: all .25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .goal-btn .icon { font-size: 28px; }
  .goal-btn:hover { border-color: var(--accent); color: var(--text); }
  .goal-btn.active.cut { border-color: var(--accent2); color: var(--accent2); background: rgba(0,201,167,.08); }
  .goal-btn.active.bulk { border-color: var(--accent); color: var(--accent); background: rgba(255,87,34,.08); }

  .btn-generate {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #ff7043);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,87,34,.3); }

  /* ====== Results ====== */
  .results { display: none; margin: 32px 0; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
  }
  .stat-card .label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }
  .stat-card .unit { font-size: 12px; color: var(--sub); }
  .stat-card .subtext { font-size: 12px; margin-top: 4px; }
  .val-red { color: var(--accent); }
  .val-green { color: var(--accent2); }
  .val-gold { color: var(--gold); }
  .val-blue { color: var(--blue); }

  /* Grid */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }
  .card.full { grid-column: 1 / -1; }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Macro bars */
  .macro-item { margin-bottom: 14px; }
  .macro-item .macro-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .macro-bar-wrap { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
  .macro-bar { height: 100%; border-radius: 5px; transition: width 1s ease; }
  .macro-bar.protein { background: var(--accent); }
  .macro-bar.carbs { background: var(--gold); }
  .macro-bar.fat { background: var(--accent2); }

  /* Meal list */
  .meal-list { list-style: none; }
  .meal-list li {
    padding: 12px 14px;
    border-left: 3px solid var(--border);
    margin-bottom: 10px;
    background: var(--bg);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
  }
  .meal-list li .meal-time { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .meal-list li .meal-kcal { float: right; font-weight: 700; font-size: 12px; color: var(--gold); }

  /* Training */
  .training-day {
    background: var(--bg);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .training-day .day-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .training-day .day-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .training-day .day-badge.push { background: rgba(255,87,34,.15); color: var(--accent); }
  .training-day .day-badge.pull { background: rgba(74,144,217,.15); color: var(--blue); }
  .training-day .day-badge.legs { background: rgba(0,201,167,.15); color: var(--accent2); }
  .training-day .day-badge.full { background: rgba(255,179,0,.15); color: var(--gold); }
  .training-day ul { list-style: none; }
  .training-day ul li { font-size: 13px; padding: 5px 0; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.03); }
  .training-day ul li span:last-child { color: var(--sub); font-size: 12px; }

  /* Tips */
  .tips { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .tip-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
  }
  .tip-card .tip-icon { font-size: 20px; margin-bottom: 6px; }
  .tip-card strong { display: block; margin-bottom: 4px; }

  @media (max-width: 768px) {
    .content-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
  }

  /* Footer */
  .footer { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 12px; }
</style>
</head>
<body>

<div class="hero">
  <h1>🏋️ FitPlan</h1>
  <p>输入身体数据，AI 即刻定制你的增肌 / 减脂全方案</p>
</div>

<div class="container">
  <div class="form-section">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label>性别</label>
          <select id="gender"><option value="male">男性</option><option value="female">女性</option></select>
        </div>
        <div class="form-group">
          <label>年龄 (岁)</label>
          <input type="number" id="age" value="25" min="14" max="80" placeholder="25">
        </div>
        <div class="form-group">
          <label>身高 (cm)</label>
          <input type="number" id="height" value="175" min="130" max="220" placeholder="175">
        </div>
        <div class="form-group">
          <label>体重 (kg)</label>
          <input type="number" id="weight" value="75" min="30" max="200" placeholder="75" step="0.1">
        </div>
        <div class="form-group">
          <label>活动量</label>
          <select id="activity">
            <option value="1.2">久坐不动 (几乎不运动)</option>
            <option value="1.375">轻度活动 (每周 1-3 次)</option>
            <option value="1.55" selected>中度活动 (每周 3-5 次)</option>
            <option value="1.725">高度活跃 (每周 6-7 次)</option>
            <option value="1.9">运动员级别 (每天高强度)</option>
          </select>
        </div>
      </div>

      <div class="goal-toggle" style="margin-bottom: 20px;">
        <div class="goal-btn active cut" data-goal="cut" onclick="setGoal('cut')">
          <span class="icon">🔥</span>减脂塑形<span style="font-size:11px;color:var(--sub);font-weight:400;">热量缺口 · 高蛋白</span>
        </div>
        <div class="goal-btn bulk" data-goal="bulk" onclick="setGoal('bulk')">
          <span class="icon">💪</span>增肌增重<span style="font-size:11px;color:var(--sub);font-weight:400;">热量盈余 · 高碳水</span>
        </div>
      </div>

      <button class="btn-generate" onclick="generatePlan()">⚡ 生成我的专属方案</button>
    </div>
  </div>

  <!-- ====== Results ====== -->
  <div class="results" id="results">

    <!-- Stats Cards -->
    <div class="stats-row" id="statsRow"></div>

    <div class="content-grid">
      <!-- Macro Chart -->
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--accent)"></span>每日营养素分配</div>
        <div id="macros"></div>
      </div>

      <!-- BMI + Body Info -->
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--blue)"></span>身体数据</div>
        <div id="bodyInfo"></div>
      </div>

      <!-- Meal Plan -->
      <div class="card full">
        <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>🍽️ 每日食谱推荐</div>
        <div id="mealPlan"></div>
      </div>

      <!-- Training Plan -->
      <div class="card full">
        <div class="card-title"><span class="dot" style="background:var(--accent)"></span>🏋️ 每周力量训练</div>
        <div id="trainingPlan"></div>
      </div>

      <!-- Tips -->
      <div class="card full">
        <div class="card-title"><span class="dot" style="background:var(--gold)"></span>💡 关键提示</div>
        <div id="tips"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  FitPlan · 数据仅供参考，具体请咨询专业营养师或医生
</div>

<script>
// ========== 全局状态 ==========
let goal = 'cut';

function setGoal(g) {
  goal = g;
  document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active', 'cut', 'bulk'));
  const btn = document.querySelector(`[data-goal="${g}"]`);
  btn.classList.add('active', g);
}

// ========== 核心计算 ==========
function calcBMI(weight, heightM) {
  return weight / (heightM * heightM);
}

function calcBMR(gender, weight, height, age) {
  // Mifflin-St Jeor
  if (gender === 'male') {
    return 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    return 10 * weight + 6.25 * height - 5 * age - 161;
  }
}

function calcTDEE(bmr, activityFactor) {
  return bmr * activityFactor;
}

function calcTargetCalories(tdee, goal) {
  if (goal === 'cut') return tdee - 450;  // 约450kcal缺口
  return tdee + 400;  // 约400kcal盈余
}

function calcMacros(targetCal, goal) {
  if (goal === 'cut') {
    // 高蛋白减脂: 40%蛋白, 30%碳水, 30%脂肪
    return {
      protein: { grams: Math.round(targetCal * 0.40 / 4), cal: Math.round(targetCal * 0.40) },
      carbs:   { grams: Math.round(targetCal * 0.30 / 4), cal: Math.round(targetCal * 0.30) },
      fat:     { grams: Math.round(targetCal * 0.30 / 9), cal: Math.round(targetCal * 0.30) },
      fiber: Math.round(targetCal / 1000 * 14), // ~14g per 1000kcal
    };
  } else {
    // 增肌: 30%蛋白, 50%碳水, 20%脂肪
    return {
      protein: { grams: Math.round(targetCal * 0.30 / 4), cal: Math.round(targetCal * 0.30) },
      carbs:   { grams: Math.round(targetCal * 0.50 / 4), cal: Math.round(targetCal * 0.50) },
      fat:     { grams: Math.round(targetCal * 0.20 / 9), cal: Math.round(targetCal * 0.20) },
      fiber: Math.round(targetCal / 1000 * 14),
    };
  }
}

// ========== 生成方案 ==========
function generatePlan() {
  const gender = document.getElementById('gender').value;
  const age = parseInt(document.getElementById('age').value) || 25;
  const height = parseInt(document.getElementById('height').value) || 175;
  const weight = parseFloat(document.getElementById('weight').value) || 75;
  const activity = parseFloat(document.getElementById('activity').value) || 1.55;

  const heightM = height / 100;
  const bmi = calcBMI(weight, heightM);
  const bmr = calcBMR(gender, weight, height, age);
  const tdee = calcTDEE(bmr, activity);
  const targetCal = calcTargetCalories(tdee, goal);
  const macros = calcMacros(targetCal, goal);

  // BMI 分类
  let bmiCategory, bmiColor;
  if (bmi < 18.5) { bmiCategory = '偏瘦'; bmiColor = 'var(--blue)'; }
  else if (bmi < 24) { bmiCategory = '正常'; bmiColor = 'var(--accent2)'; }
  else if (bmi < 28) { bmiCategory = '偏胖'; bmiColor = 'var(--gold)'; }
  else { bmiCategory = '肥胖'; bmiColor = 'var(--accent)'; }

  // 理想体重范围 (BMI 18.5-24)
  const idealLow = (18.5 * heightM * heightM).toFixed(1);
  const idealHigh = (24 * heightM * heightM).toFixed(1);

  // 活动量标签
  const actLabels = { 1.2:'久坐不动', 1.375:'轻度活动', 1.55:'中度活动', 1.725:'高度活跃', 1.9:'运动员' };
  const actLabel = actLabels[activity] || '中度活动';

  // ====== 渲染统计卡片 ======
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="label">🎯 每日目标热量</div>
      <div class="value val-red">${Math.round(targetCal)}</div>
      <div class="unit">千卡 / 天</div>
      <div class="subtext" style="color:${goal==='cut'?'var(--accent2)':'var(--accent)'}">${goal==='cut'?'⬇ 热量缺口 ~450kcal':'⬆ 热量盈余 ~400kcal'}</div>
    </div>
    <div class="stat-card">
      <div class="label">🔥 基础代谢 BMR</div>
      <div class="value val-gold">${Math.round(bmr)}</div>
      <div class="unit">千卡 / 天</div>
      <div class="subtext">静息消耗</div>
    </div>
    <div class="stat-card">
      <div class="label">📊 总消耗 TDEE</div>
      <div class="value val-blue">${Math.round(tdee)}</div>
      <div class="unit">千卡 / 天</div>
      <div class="subtext">${actLabel}</div>
    </div>
    <div class="stat-card">
      <div class="label">⚖️ BMI</div>
      <div class="value" style="color:${bmiColor}">${bmi.toFixed(1)}</div>
      <div class="unit">${bmiCategory}</div>
      <div class="subtext">理想: ${idealLow}~${idealHigh}kg</div>
    </div>
    <div class="stat-card">
      <div class="label">🥩 蛋白质</div>
      <div class="value val-red">${macros.protein.grams}g</div>
      <div class="unit">${macros.protein.cal} 千卡</div>
      <div class="subtext">${(weight*macros.protein.grams/targetCal).toFixed(1)}g/kg</div>
    </div>
    <div class="stat-card">
      <div class="label">🍚 碳水 · 脂肪</div>
      <div class="value" style="font-size:18px;">
        <span style="color:var(--gold)">${macros.carbs.grams}g</span>
        <span style="color:var(--sub)"> / </span>
        <span style="color:var(--accent2)">${macros.fat.grams}g</span>
      </div>
      <div class="unit">碳水 ${macros.carbs.cal} + 脂肪 ${macros.fat.cal} 千卡</div>
    </div>
  `;

  // ====== 营养素分配 ======
  document.getElementById('macros').innerHTML = `
    <div class="macro-item">
      <div class="macro-header"><span>🥩 蛋白质</span><span><strong>${macros.protein.grams}g</strong> · ${macros.protein.cal} kcal (${goal==='cut'?40:30}%)</span></div>
      <div class="macro-bar-wrap"><div class="macro-bar protein" style="width:${goal==='cut'?40:30}%"></div></div>
    </div>
    <div class="macro-item">
      <div class="macro-header"><span>🍚 碳水化合物</span><span><strong>${macros.carbs.grams}g</strong> · ${macros.carbs.cal} kcal (${goal==='cut'?30:50}%)</span></div>
      <div class="macro-bar-wrap"><div class="macro-bar carbs" style="width:${goal==='cut'?30:50}%"></div></div>
    </div>
    <div class="macro-item">
      <div class="macro-header"><span>🥑 脂肪</span><span><strong>${macros.fat.grams}g</strong> · ${macros.fat.cal} kcal (${goal==='cut'?30:20}%)</span></div>
      <div class="macro-bar-wrap"><div class="macro-bar fat" style="width:${goal==='cut'?30:20}%"></div></div>
    </div>
    <div class="macro-item">
      <div class="macro-header"><span>🌾 膳食纤维</span><span><strong>${macros.fiber}g</strong> 以上</span></div>
    </div>
    <div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--sub);">
      💡 1g 蛋白质 = 4kcal · 1g 碳水 = 4kcal · 1g 脂肪 = 9kcal<br>
      ${goal==='cut' ? '减脂期高蛋白保护肌肉，低碳水促进脂肪燃烧' : '增肌期高碳水提供训练能量，足量蛋白支持肌肉合成'}
    </div>
  `;

  // ====== 身体数据 ======
  document.getElementById('bodyInfo').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px;">
      <div><span style="color:var(--sub)">身高</span><br><strong>${height} cm</strong></div>
      <div><span style="color:var(--sub)">体重</span><br><strong>${weight} kg</strong></div>
      <div><span style="color:var(--sub)">BMI</span><br><strong style="color:${bmiColor}">${bmi.toFixed(1)} · ${bmiCategory}</strong></div>
      <div><span style="color:var(--sub)">理想体重</span><br><strong>${idealLow} ~ ${idealHigh} kg</strong></div>
      <div><span style="color:var(--sub)">BMR</span><br><strong>${Math.round(bmr)} kcal</strong></div>
      <div><span style="color:var(--sub)">TDEE</span><br><strong>${Math.round(tdee)} kcal</strong></div>
      <div style="grid-column:1/-1;margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;font-size:13px;">
        <strong>${goal==='cut'?'🎯 减脂目标': '🎯 增肌目标'}：</strong>
        ${goal==='cut'
          ? `每日 ${Math.round(targetCal)} kcal · 预计每周减 0.4~0.5kg`
          : `每日 ${Math.round(targetCal)} kcal · 预计每周增 0.2~0.3kg`
        }
      </div>
    </div>
  `;

  // ====== 食谱 ======
  document.getElementById('mealPlan').innerHTML = generateMealPlan(targetCal, macros, goal);

  // ====== 训练计划 ======
  document.getElementById('trainingPlan').innerHTML = generateTrainingPlan(goal);

  // ====== 关键提示 ======
  document.getElementById('tips').innerHTML = `
    <div class="tips">
      <div class="tip-card">
        <div class="tip-icon">💧</div>
        <strong>每日饮水</strong>
        体重 × 35ml = <b>${Math.round(weight * 35)}ml</b>。运动日额外 +500ml。
      </div>
      <div class="tip-card">
        <div class="tip-icon">😴</div>
        <strong>睡眠质量</strong>
        每天 7-8 小时。睡眠不足会升高皮质醇，阻碍${goal==='cut'?'减脂':'增肌'}。
      </div>
      <div class="tip-card">
        <div class="tip-icon">📏</div>
        <strong>${goal==='cut'?'热量缺口':'热量盈余'}</strong>
        ${goal==='cut'
          ? '每日缺口约450kcal，安全减脂。不要低于BMR，避免代谢下降。'
          : '每日盈余约400kcal，精益增肌。盈余过大容易增加过多脂肪。'
        }
      </div>
      <div class="tip-card">
        <div class="tip-icon">🔄</div>
        <strong>每周调整</strong>
        每周同一时间称重，根据体重变化调整 ±100kcal。
      </div>
    </div>
  `;

  // 显示结果
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

// ========== 食谱生成 ==========
function generateMealPlan(targetCal, macros, goal) {
  const cal = Math.round(targetCal);
  // 三餐热量分配: 早餐25% 午餐35% 晚餐30% 加餐10%
  const bfCal = Math.round(cal * 0.25);
  const luCal = Math.round(cal * 0.35);
  const diCal = Math.round(cal * 0.30);
  const snCal = Math.round(cal * 0.10);

  // 食物数据库 [name, kcal, protein, carbs, fat]
  const breakfasts = [
    ['全麦面包2片 + 水煮蛋2个 + 牛奶250ml', 450, 32, 40, 16],
    ['燕麦片50g + 蛋白粉1勺 + 香蕉1根 + 脱脂奶', 480, 35, 55, 10],
    ['杂粮馒头1个 + 鸡蛋2个 + 豆浆300ml', 420, 28, 45, 14],
    ['全麦吐司3片 + 花生酱15g + 希腊酸奶150g', 440, 25, 42, 20],
    ['玉米1根 + 水煮蛋3个 + 脱脂牛奶250ml', 400, 30, 35, 14],
    ['紫薯150g + 鸡蛋白4个 + 核桃15g + 酸奶', 430, 32, 38, 16],
  ];

  const lunches = goal === 'cut' ? [
    ['鸡胸肉150g + 糙米饭150g + 西兰花200g', 480, 45, 50, 12],
    ['清蒸鱼200g + 藜麦100g + 凉拌菠菜', 450, 42, 42, 14],
    ['虾仁150g + 荞麦面100g + 黄瓜+西红柿', 460, 38, 48, 13],
    ['瘦牛肉120g + 紫薯150g + 炒时蔬', 490, 40, 45, 15],
    ['去皮鸡腿150g + 杂粮饭150g + 芦笋', 470, 42, 48, 12],
    ['豆腐200g + 虾仁80g + 红薯150g + 西兰花', 440, 36, 46, 14],
  ] : [
    ['鸡胸肉200g + 白米饭200g + 西兰花150g', 580, 48, 72, 14],
    ['牛肉150g + 土豆泥200g + 胡萝卜+青椒', 620, 42, 78, 16],
    ['三文鱼180g + 糙米饭200g + 炒菠菜', 590, 44, 68, 18],
    ['猪里脊150g + 馒头2个 + 炒豆角', 600, 40, 75, 15],
    ['鸡腿2个 + 白米饭200g + 炒蘑菇', 570, 44, 70, 14],
    ['虾仁200g + 意面150g + 番茄酱+蔬菜', 610, 46, 76, 14],
  ];

  const dinners = goal === 'cut' ? [
    ['蒸鱼200g + 蒸南瓜200g + 凉拌黄瓜', 380, 38, 35, 10],
    ['虾仁100g + 豆腐150g + 魔芋丝 + 青菜', 350, 35, 25, 12],
    ['鸡蛋白4个 + 菌菇汤 + 蒸紫薯100g', 320, 30, 30, 8],
    ['瘦牛肉100g + 沙拉(生菜+番茄+油醋汁)', 340, 32, 20, 14],
    ['清蒸鸡胸150g + 冬瓜汤 + 玉米半根', 360, 38, 32, 8],
    ['蛤蜊200g + 蒸豆腐 + 炒空心菜', 330, 34, 22, 10],
  ] : [
    ['鸡胸肉150g + 炒饭(米饭200g+蛋+蔬菜)', 520, 40, 65, 14],
    ['牛肉120g + 土豆炖胡萝卜 + 米饭150g', 540, 36, 68, 16],
    ['三文鱼150g + 烤红薯200g + 炒芦笋', 500, 38, 55, 16],
    ['鸡蛋2个 + 瘦猪肉100g + 荞麦面150g', 530, 40, 60, 15],
    ['去皮鸡腿200g + 白米饭180g + 凉拌木耳', 510, 42, 62, 12],
    ['虾仁150g + 土豆泥 + 炒西兰花', 490, 36, 58, 14],
  ];

  const snacks = goal === 'cut' ? [
    ['蛋白粉1勺(30g) + 水', 120, 24, 3, 1],
    ['希腊酸奶100g + 蓝莓50g', 100, 10, 12, 3],
    ['水煮蛋2个', 140, 12, 2, 8],
    ['蛋白棒1根', 180, 20, 15, 6],
    ['脱脂牛奶250ml + 杏仁10颗', 150, 12, 14, 6],
    ['黄瓜条 + 鸡胸肉丝50g', 90, 16, 3, 2],
  ] : [
    ['蛋白粉1勺 + 全脂牛奶300ml', 280, 32, 25, 8],
    ['全麦面包2片 + 花生酱 + 香蕉', 320, 12, 48, 12],
    ['坚果30g + 酸奶150g', 220, 8, 15, 16],
    ['鸡蛋3个 + 吐司1片', 250, 20, 18, 10],
    ['牛肉干50g + 水果', 200, 22, 15, 6],
    ['牛奶250ml + 燕麦饼干2片', 260, 10, 35, 9],
  ];

  function pick(arr, targetKcal) {
    let best = arr[0];
    let bestDiff = Math.abs(getKcal(best) - targetKcal);
    arr.forEach(item => {
      const diff = Math.abs(getKcal(item) - targetKcal);
      if (diff < bestDiff) { bestDiff = diff; best = item; }
    });
    return best;
  }
  function getKcal(item) { return item[1]; }

  const bf = pick(breakfasts, bfCal);
  const lu = pick(lunches, luCal);
  const di = pick(dinners, diCal);
  const sn = pick(snacks, snCal);

  return `
    <ul class="meal-list">
      <li style="border-left-color:var(--gold)">
        <div class="meal-time">🌅 早餐 · ~${bf[1]} kcal</div>
        <span class="meal-kcal">${bf[1]} kcal</span>
        <div>${bf[0]}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:3px">蛋白 ${bf[2]}g · 碳水 ${bf[3]}g · 脂肪 ${bf[4]}g</div>
      </li>
      <li style="border-left-color:var(--accent)">
        <div class="meal-time">☀️ 午餐 · ~${lu[1]} kcal</div>
        <span class="meal-kcal">${lu[1]} kcal</span>
        <div>${lu[0]}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:3px">蛋白 ${lu[2]}g · 碳水 ${lu[3]}g · 脂肪 ${lu[4]}g</div>
      </li>
      <li style="border-left-color:var(--blue)">
        <div class="meal-time">🌆 晚餐 · ~${di[1]} kcal</div>
        <span class="meal-kcal">${di[1]} kcal</span>
        <div>${di[0]}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:3px">蛋白 ${di[2]}g · 碳水 ${di[3]}g · 脂肪 ${di[4]}g</div>
      </li>
      <li style="border-left-color:var(--accent2)">
        <div class="meal-time">🍎 加餐 · ~${sn[1]} kcal</div>
        <span class="meal-kcal">${sn[1]} kcal</span>
        <div>${sn[0]}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:3px">蛋白 ${sn[2]}g · 碳水 ${sn[3]}g · 脂肪 ${sn[4]}g</div>
      </li>
    </ul>
    <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--sub);text-align:center;">
      📊 全天合计约 <b style="color:var(--text)">${bf[1]+lu[1]+di[1]+sn[1]} kcal</b> ·
      蛋白 <b style="color:var(--text)">${bf[2]+lu[2]+di[2]+sn[2]}g</b> ·
      碳水 <b style="color:var(--text)">${bf[3]+lu[3]+di[3]+sn[3]}g</b> ·
      脂肪 <b style="color:var(--text)">${bf[4]+lu[4]+di[4]+sn[4]}g</b>
    </div>
  `;
}

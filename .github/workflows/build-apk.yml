name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          # Create app directory
          mkdir -p app-build/www
          cp index.html app-build/www/
          cp manifest.json app-build/www/
          cp icon-192.png app-build/www/
          cp icon-512.png app-build/www/
          cd app-build

          # Init npm
          npm init -y

          # Install Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Create config (before cap init to avoid duplicate prompt)
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.fitplan.app",
            "appName": "FitPlan",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          CAPEOF

          # Init and add Android
          npx cap init FitPlan com.fitplan.app --web-dir=www
          npx cap add android

      - name: Compile APK
        run: |
          cd app-build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitPlan-APK
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 'FitPlan v${{ github.run_number }}'
          files: app-build/android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools cmdline-tools;latest'
          cache: true

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          # Create app directory
          mkdir -p app-build/www
          cp index.html app-build/www/
          cp manifest.json app-build/www/
          cp icon-192.png app-build/www/
          cp icon-512.png app-build/www/
          cd app-build

          # Init npm
          npm init -y

          # Install Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Create config (before cap init to avoid duplicate prompt)
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.fitplan.app",
            "appName": "FitPlan",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          CAPEOF

          # Init and add Android
          npx cap init FitPlan com.fitplan.app --web-dir=www
          npx cap add android

      - name: Build Android App
        run: |
          cd app-build
          npx cap sync android
          cd android
          ANDROID_SDK=$(echo $ANDROID_SDK_ROOT | tr '\\\\' '/')
          echo "sdk.dir=$ANDROID_SDK" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy APK
        run: |
          APK=$(find app-build/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" app-build/fitplan.apk
            echo "APK: $APK ($(stat -c%s app-build/fitplan.apk) bytes)"
          else
            echo "ERROR: No APK found"
            find app-build/android -name "*.apk" -type f 2>/dev/null
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitPlan-APK
          path: app-build/fitplan.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 'FitPlan v${{ github.run_number }}'
          files: app-build/fitplan.apk
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools cmdline-tools;latest'
          cache: true

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          # Create app directory
          mkdir -p app-build/www
          cp index.html app-build/www/
          cp manifest.json app-build/www/
          cp icon-192.png app-build/www/
          cp icon-512.png app-build/www/
          cd app-build

          # Init npm
          npm init -y

          # Install Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Create config (before cap init to avoid duplicate prompt)
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.fitplan.app",
            "appName": "FitPlan",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          CAPEOF

          # Init and add Android
          npx cap init FitPlan com.fitplan.app --web-dir=www
          npx cap add android

      - name: Compile APK
        run: |
          cd app-build/android
          ANDROID_SDK=$(echo $ANDROID_SDK_ROOT | tr '\\\\' '/')
          echo "sdk.dir=$ANDROID_SDK" > local.properties
          echo "android.compileSdkVersion=34" >> gradle.properties
          echo "android.buildToolsVersion=34.0.0" >> gradle.properties
          chmod +x gradlew
          echo "=== Building ==="
          ./gradlew assembleDebug 2>&1 | tail -30
          echo "=== Searching for APK files anywhere ==="
          find /home -name "*.apk" -type f 2>/dev/null
          echo "=== Searching in current dir ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Listing build dirs ==="
          ls -R app/build/outputs/ 2>/dev/null || echo "No app/build/outputs"
          # Try multiple possible paths
          for p in app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/*.apk; do
            if [ -f "$p" ]; then echo "FOUND: $p"; cp "$p" ../fitplan.apk; break; fi
          done
          if [ -f ../fitplan.apk ]; then echo "APK copied! Size: $(stat -c%s ../fitplan.apk)"; else echo "FATAL: No APK found"; fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitPlan-APK
          path: app-build/fitplan.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: 'FitPlan v${{ github.run_number }}'
          files: app-build/fitplan.apk
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
